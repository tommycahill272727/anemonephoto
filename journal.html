<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal — Anemone Photo</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Oswald:wght@700&family=Lora:ital,wght@0,400;1,400;1,600&family=Special+Elite&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--paper:#e8dfc8;--paper2:#dfd5b8;--paper3:#f2ebe0;--aged:#c9bc9e;--ink:#1c1510;--ink2:#2e261a;--faded:#7a6e5a;--red:#8b2222;--red2:#a33030;}
html{scroll-behavior:smooth;}
body{background:var(--paper3);color:var(--ink);font-family:'Lora',serif;overflow-x:hidden;background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(160,140,100,0.18) 31px,rgba(160,140,100,0.18) 32px);background-size:100% 32px;}
body::before{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0.06;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:512px;}
.edit-mode [contenteditable]{outline:none;border-bottom:2px dashed rgba(139,34,34,0.5);cursor:text;transition:background 0.15s;position:relative;}
.edit-mode [contenteditable]:hover{background:rgba(139,34,34,0.08);}
.edit-mode [contenteditable]:focus{background:rgba(139,34,34,0.07);border-bottom-color:var(--red);}
.edit-toolbar{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;gap:0.6rem;align-items:center;background:var(--ink2);padding:0.7rem 1rem;border-top:2px solid var(--red);box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.edit-toolbar button{font-family:'Special Elite',monospace;font-size:0.52rem;letter-spacing:0.25em;text-transform:uppercase;padding:0.4rem 0.8rem;border:1px solid rgba(232,224,208,0.2);color:var(--aged);background:transparent;cursor:pointer;transition:all 0.2s;}
.edit-toolbar button:hover{border-color:var(--paper);color:var(--paper);}
.edit-toolbar button.primary{border-color:var(--red2);color:var(--paper3);background:var(--red);}
.toolbar-label{font-family:'Caveat',cursive;font-size:0.9rem;color:rgba(232,224,208,0.4);}
nav{position:sticky;top:0;z-index:1000;background:var(--ink2);padding:0.8rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--red);}
.logo{font-family:'Oswald',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--paper3);text-decoration:none;}
.logo em{color:var(--red2);font-style:normal;}
.nav-links{display:flex;gap:2.5rem;list-style:none;}
.nav-links a{font-family:'Caveat',cursive;font-size:1.05rem;color:var(--aged);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover,.nav-links a.cur{color:var(--paper3);}
.nav-edit-btn{font-family:'Special Elite',monospace;font-size:0.5rem;letter-spacing:0.25em;text-transform:uppercase;padding:0.3rem 0.7rem;border:1px solid rgba(139,34,34,0.4);color:rgba(232,224,208,0.5);background:transparent;cursor:pointer;transition:all 0.2s;margin-left:1rem;}
.nav-edit-btn:hover,.nav-edit-btn.on{border-color:var(--red2);color:var(--paper3);background:rgba(139,34,34,0.3);}
.journal-header{background:var(--ink);padding:4rem 3rem 3.5rem 100px;position:relative;border-bottom:3px solid var(--red);}
.journal-header::after{content:'';position:absolute;top:0;bottom:0;left:88px;width:2px;background:rgba(139,34,34,0.2);pointer-events:none;}
.journal-header::before{content:'';position:absolute;inset:0;pointer-events:none;opacity:0.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:512px;}
.jh-inner{position:relative;z-index:1;}
.jh-label{font-family:'Special Elite',monospace;font-size:0.58rem;letter-spacing:0.45em;text-transform:uppercase;color:rgba(232,224,208,0.35);margin-bottom:0.5rem;}
.jh-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(3rem,7vw,6rem);line-height:0.85;text-transform:uppercase;letter-spacing:0.03em;color:var(--paper3);}
.jh-title em{color:var(--red2);font-style:normal;}
.jh-rule{width:60px;height:3px;background:var(--red);margin:1.2rem 0 1rem;}
.jh-sub{font-family:'Caveat',cursive;font-size:1.1rem;color:rgba(232,224,208,0.4);}
.journal-body{max-width:900px;padding:4rem 3rem 4rem 100px;position:relative;}
.journal-body::before{content:'';position:absolute;top:0;bottom:0;left:88px;width:2px;background:rgba(139,34,34,0.2);pointer-events:none;}
.add-entry-btn{display:flex;align-items:center;gap:0.6rem;font-family:'Special Elite',monospace;font-size:0.55rem;letter-spacing:0.35em;text-transform:uppercase;color:rgba(139,34,34,0.5);border:1px dashed rgba(139,34,34,0.25);padding:0.9rem 1.4rem;cursor:pointer;background:transparent;transition:all 0.2s;margin-bottom:3rem;}
.add-entry-btn:hover{color:var(--red);border-color:rgba(139,34,34,0.5);background:rgba(139,34,34,0.04);}
.add-entry-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;}
.entry-card{position:relative;margin-bottom:4rem;padding-bottom:4rem;border-bottom:1px solid rgba(160,140,100,0.25);}
.entry-card:last-child{border-bottom:none;}
.entry-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:0.5rem;}
.entry-dateline{font-family:'Special Elite',monospace;font-size:0.62rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--faded);}
.entry-delete{font-family:'Special Elite',monospace;font-size:0.44rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(139,34,34,0.3);border:1px solid rgba(139,34,34,0.15);background:transparent;padding:0.2rem 0.5rem;cursor:pointer;transition:all 0.2s;display:none;}
.edit-mode .entry-delete{display:inline-block;}
.entry-delete:hover{color:var(--red);border-color:var(--red);}
.entry-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(2rem,4vw,3rem);text-transform:uppercase;letter-spacing:0.03em;color:var(--ink);line-height:0.9;margin-bottom:0.8rem;}
.entry-title em{color:var(--red);font-style:normal;}
.entry-rule{width:45px;height:3px;background:var(--red);margin-bottom:1.5rem;}
.entry-photo{position:relative;margin-bottom:1.8rem;background:#0d0b08;padding:5px 5px 20px;box-shadow:2px 3px 0 rgba(0,0,0,0.3),0 8px 20px rgba(0,0,0,0.18);display:inline-block;transform:rotate(var(--pr,-1deg));cursor:default;transition:transform 0.3s cubic-bezier(0.2,1,0.3,1),box-shadow 0.3s;max-width:560px;width:100%;}
.edit-mode .entry-photo{cursor:pointer;}
.entry-photo:hover{transform:rotate(var(--pr,-1deg)) scale(1.015);box-shadow:4px 5px 0 rgba(0,0,0,0.4),0 14px 30px rgba(0,0,0,0.25);}
.ep-img-wrap{width:100%;height:320px;overflow:hidden;background:#111009;display:flex;align-items:center;justify-content:center;position:relative;}
.ep-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.ep-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;color:rgba(200,185,160,0.06);gap:0.5rem;pointer-events:none;}
.edit-mode .ep-placeholder{color:rgba(200,185,160,0.3);}
.ep-placeholder svg{width:36px;height:36px;stroke:currentColor;fill:none;}
.ep-placeholder span{font-family:'Special Elite',monospace;font-size:0.45rem;letter-spacing:0.22em;text-transform:uppercase;}
.ep-img-wrap:hover .ep-placeholder{color:rgba(200,185,160,0.65);}
.ep-img-wrap:hover::after{content:'';position:absolute;inset:0;border:2px dashed rgba(200,185,160,0.2);pointer-events:none;}
.ep-tape{position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:55px;height:15px;background:rgba(240,220,140,0.5);border-top:1px solid rgba(200,185,80,0.32);border-bottom:1px solid rgba(200,185,80,0.32);z-index:10;pointer-events:none;}
.ep-curl{position:absolute;bottom:0;right:0;width:20px;height:20px;background:linear-gradient(225deg,rgba(20,14,8,0.85) 45%,rgba(0,0,0,0.15) 45%,rgba(0,0,0,0.06) 50%,transparent 50%);z-index:6;pointer-events:none;}
.ep-num{position:absolute;bottom:3px;left:7px;font-family:'Special Elite',monospace;font-size:0.44rem;letter-spacing:0.16em;color:rgba(200,185,160,0.38);pointer-events:none;}
.photo-row{display:flex;gap:2rem;align-items:flex-start;flex-wrap:wrap;}
.photo-margin-note{font-family:'Caveat',cursive;font-size:0.9rem;color:var(--faded);line-height:1.6;transform:rotate(1.5deg);display:inline-block;border-left:2px solid rgba(139,34,34,0.25);padding-left:0.8rem;max-width:160px;align-self:center;flex-shrink:0;}
.entry-loc-row{display:flex;align-items:center;gap:0.4rem;margin-bottom:1.2rem;}
.entry-pin{font-size:0.9rem;color:var(--red);flex-shrink:0;line-height:1;}
.entry-location-tag{font-family:'Special Elite',monospace;font-size:0.55rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--red);}
.entry-text{font-family:'Lora',serif;font-style:italic;font-size:1rem;color:var(--ink2);line-height:2.1;max-width:60ch;white-space:pre-wrap;}
footer{background:var(--ink2);border-top:3px solid var(--red);padding:2rem 3rem 2rem 100px;display:flex;justify-content:space-between;align-items:center;}
.foot-brand{font-family:'Oswald',sans-serif;font-weight:700;font-size:1.3rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--paper3);}
.foot-brand em{color:var(--red2);font-style:normal;}
.foot-links{display:flex;gap:2.5rem;}
.foot-links a{font-family:'Caveat',cursive;font-size:1rem;color:var(--aged);text-decoration:none;transition:color 0.2s;}
.foot-links a:hover{color:var(--paper3);}
.foot-copy{font-family:'Special Elite',monospace;font-size:0.48rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(232,224,208,0.2);}
.reveal{opacity:0;transform:translateY(14px);transition:opacity 0.8s cubic-bezier(0.22,1,0.36,1),transform 0.8s cubic-bezier(0.22,1,0.36,1);}
.reveal.vis{opacity:1;transform:none;}
</style>
</head>
<body>
<input type="file" id="file-input" accept="image/*" style="display:none;">
<nav>
  <a class="logo" href="anemone-photo.html">Anemone <em>Photo</em></a>
  <ul class="nav-links">
    <li><a href="portfolio.html">Portfolio</a></li>
    <li><a href="journal.html" class="cur">Journal</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <button class="nav-edit-btn" id="editToggle">&#9998; Edit Page</button>
</nav>
<div class="edit-toolbar" id="editToolbar" style="display:none;">
  <span class="toolbar-label">Editing mode on</span>
  <button onclick="saveAll()">Save Changes</button>
  <button onclick="clearSaved()">Clear All</button>
  <button class="primary" onclick="toggleEdit()">Done</button>
</div>
<div class="journal-header">
  <div class="jh-inner">
    <div class="jh-label" contenteditable="false" data-key="jh-label">Tommy Cahill &middot; Anemone Photo</div>
    <h1 class="jh-title" contenteditable="false" data-key="jh-title">Field<br><em>Journal</em></h1>
    <div class="jh-rule"></div>
    <p class="jh-sub" contenteditable="false" data-key="jh-sub">Notes from the road. Written in the moment.</p>
  </div>
</div>
<div class="journal-body" id="journalBody">
  <button class="add-entry-btn" id="addEntryBtn">
    <svg viewBox="0 0 24 24" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New Journal Entry
  </button>
  <div id="entriesContainer"></div>
</div>
<footer>
  <span class="foot-brand" contenteditable="false" data-key="foot-brand">Ane<em>mone</em> Photo</span>
  <div class="foot-links">
    <a href="anemone-photo.html">Home</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="contact.html">Contact</a>
  </div>
  <span class="foot-copy" contenteditable="false" data-key="foot-copy">&copy; 2025 Tommy Cahill &middot; All rights reserved</span>
</footer>
<script>
const PAGE='journal';
let editMode=false;
let entries=[];
let pendingPhotoId=null;
const ROTS=[-1.5,1.2,-0.8,2,-1.8,0.7,-2.2,1.5];

function saveEntries(){try{localStorage.setItem(PAGE+'_entries',JSON.stringify(entries));}catch(e){alert('Storage limit — try smaller photo files.');}}
function loadEntries(){
  try{const d=localStorage.getItem(PAGE+'_entries');entries=d?JSON.parse(d):[];}catch(e){entries=[];}
  if(entries.length===0){
    entries=[{id:'seed',date:'Day 12 \u2014 Somewhere above the treeline, Iceland',title:'Fallen Light',location:'Vatna\u00f6kull, Iceland',filmNote:'\u25a0 12A \u00b7 Kodak Portra 400 \u00b7 f/8 \u00b7 1/125',marginNote:'note to self \u2014 bring more film next time. obviously.',text:'Seventeen days along the Arctic coastline. The light here doesn\u2019t rise or fall the way light should \u2014 it drags, slides, lingers on the horizon like it can\u2019t quite commit to leaving. The kind of light that makes you stop walking and just stand there, cold, not caring.\n\nI shot three rolls before breakfast. None of them will be any good. That\u2019s okay. Some things you shoot just to prove you were there.',photoSrc:null,photoRot:-1.2}];
    saveEntries();
  }
}

function renderEntries(){
  const c=document.getElementById('entriesContainer');c.innerHTML='';
  entries.forEach((entry,idx)=>{
    const rot=entry.photoRot||ROTS[idx%ROTS.length];
    const div=document.createElement('div');
    div.className='entry-card reveal';div.dataset.entryid=entry.id;
    div.innerHTML=`
      <div class="entry-header">
        <span class="entry-dateline" contenteditable="false" data-eid="${entry.id}" data-field="date">${entry.date}</span>
        <button class="entry-delete" onclick="deleteEntry('${entry.id}')">Remove entry</button>
      </div>
      <h2 class="entry-title" contenteditable="false" data-eid="${entry.id}" data-field="title">${entry.title}</h2>
      <div class="entry-rule"></div>
      <div class="entry-loc-row">
        <span class="entry-pin">&#8982;</span>
        <span class="entry-location-tag" contenteditable="false" data-eid="${entry.id}" data-field="location">${entry.location}</span>
      </div>
      <div class="photo-row">
        <div class="entry-photo" style="--pr:${rot}deg;" onclick="pickPhoto('${entry.id}')">
          <div class="ep-tape"></div>
          <div class="ep-img-wrap">
            ${entry.photoSrc?`<img src="${entry.photoSrc}" alt="">`:
            `<div class="ep-placeholder"><svg viewBox="0 0 24 24" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>Click to add photo</span></div>`}
          </div>
          <div class="ep-num" contenteditable="false" data-eid="${entry.id}" data-field="filmNote">${entry.filmNote}</div>
          <div class="ep-curl"></div>
        </div>
        <div class="photo-margin-note" contenteditable="false" data-eid="${entry.id}" data-field="marginNote">${entry.marginNote}</div>
      </div>
      <p class="entry-text" contenteditable="false" data-eid="${entry.id}" data-field="text">${entry.text}</p>`;
    div.querySelectorAll('[data-field]').forEach(el=>{
      el.addEventListener('blur',()=>{const e=entries.find(x=>x.id===el.dataset.eid);if(e){e[el.dataset.field]=el.innerText;saveEntries();}});
    });
    c.appendChild(div);
  });
  applyEditState();
  document.querySelectorAll('.reveal:not(.vis)').forEach(el=>obs.observe(el));
}

document.getElementById('addEntryBtn').addEventListener('click',()=>{
  const id='entry_'+Date.now();
  entries.unshift({id,date:'Date \u2014 Location',title:'Entry Title',location:'Location',filmNote:'\u25a0 Film stock \u00b7 Camera',marginNote:'notes...',text:'Write your journal entry here.',photoSrc:null,photoRot:ROTS[entries.length%ROTS.length]});
  saveEntries();renderEntries();
  if(!editMode)toggleEdit();
  document.getElementById('entriesContainer').firstChild?.scrollIntoView({behavior:'smooth',block:'start'});
});

function deleteEntry(id){if(!confirm('Remove this entry?'))return;entries=entries.filter(e=>e.id!==id);saveEntries();renderEntries();}

function pickPhoto(id){
  if(!editMode){alert('Enable edit mode first to add photos.');return;}
  pendingPhotoId=id;
  const input=document.getElementById('file-input');
  input.value='';
  input.onchange=function(){
    if(!this.files[0])return;
    const reader=new FileReader();
    reader.onload=function(ev){const e=entries.find(x=>x.id===pendingPhotoId);if(e){e.photoSrc=ev.target.result;saveEntries();renderEntries();}};
    reader.readAsDataURL(this.files[0]);
  };
  input.click();
}

function toggleEdit(){
  editMode=!editMode;
  document.body.classList.toggle('edit-mode',editMode);
  const btn=document.getElementById('editToggle');
  btn.classList.toggle('on',editMode);
  btn.textContent=editMode?'Editing...':'&#9998; Edit Page';
  document.getElementById('editToolbar').style.display=editMode?'flex':'none';
  applyEditState();
}
function applyEditState(){document.querySelectorAll('[contenteditable]').forEach(el=>{el.contentEditable=editMode?'true':'false';});}
document.getElementById('editToggle').addEventListener('click',toggleEdit);

function saveAll(){
  document.querySelectorAll('[data-eid][data-field]').forEach(el=>{const e=entries.find(x=>x.id===el.dataset.eid);if(e)e[el.dataset.field]=el.innerText;});
  saveEntries();
  // save static page text
  document.querySelectorAll('[data-key]').forEach(el=>{try{localStorage.setItem(PAGE+'_key_'+el.dataset.key,el.innerHTML);}catch(e){}});
  const btn=document.querySelector('.edit-toolbar button');btn.textContent='Saved \u2713';setTimeout(()=>btn.textContent='Save Changes',1500);
}
function restorePageText(){document.querySelectorAll('[data-key]').forEach(el=>{const s=localStorage.getItem(PAGE+'_key_'+el.dataset.key);if(s!==null)el.innerHTML=s;});}
function clearSaved(){if(!confirm('Clear all journal entries and text changes?'))return;const keys=Object.keys(localStorage).filter(k=>k.startsWith(PAGE+'_'));keys.forEach(k=>localStorage.removeItem(k));entries=[];location.reload();}

const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target);}});},{threshold:0.06});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));

loadEntries();restorePageText();renderEntries();
</script>
</body>
</html>
